version: '3.8'

services:
  app:
    build: .
    container_name: pharmacy_app
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: pharmacy_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: apteka
    ports:
      - "3306:3306"
