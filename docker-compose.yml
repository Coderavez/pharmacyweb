version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharmacy_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - pharmacy

  nginx:
    image: nginx:alpine
    container_name: pharmacy_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    networks:
      - pharmacy

  db:
    image: mysql:8.0
    container_name: pharmacy_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pharmacy
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: pharmacy
    ports:
      - "3306:3306"
    networks:
      - pharmacy

networks:
  pharmacy:
